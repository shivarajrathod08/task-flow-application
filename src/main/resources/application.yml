spring:
  datasource:
    url: jdbc:mysql://localhost:3306/taskflowai?useSSL=false&serverTimezone=UTC
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

ai:
  provider: gemini
  gemini:
    api-key: ${GEMINI_API_KEY}
    model: gemini-2.5-flash

meetflow:
  demo-mode: false
  escalation:
    delay-threshold-hours: 24
  health:
    overdue-threshold-hours: 24
    overload-task-limit: 5
  self-healing:
    default-deadline-days: 3
    default-assignee: team@company.com